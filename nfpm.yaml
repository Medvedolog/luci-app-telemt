name: "luci-app-telemt"
platform: "linux"
version: "3.2.2-1"
section: "net"
maintainer: "Medvedolog <Medvedolog@github.com>"
description: "LuCI WebUI for Telemt MTProxy. Manages core and bot."
depends:
  - luci-base
  - luci-compat
  - qrencode
contents:
  - src: ./luci/telemt.lua
    dst: /usr/lib/lua/luci/model/cbi/telemt.lua
  # Если есть JSON для меню:
  - src: ./luci/luci-app-telemt.json
    dst: /usr/share/luci/menu.d/luci-app-telemt.json
scripts:
  postinstall: ./scripts/postinst
  postremove: ./scripts/postrm
